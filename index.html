<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stuart Dash" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Stuart Dash - Rental Manager</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* ── Top Bar ── */
    .topbar {
      padding: 12px 16px 0;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      flex-shrink: 0;
    }

    .topbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar-left h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .topbar-left .subtitle {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .topbar-right {
      text-align: right;
    }

    .update-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: #666;
      background: #141414;
      border: 1px solid #1e1e1e;
      padding: 4px 8px;
      border-radius: 12px;
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    .pulse-dot.stale { background: #f97316; }
    .pulse-dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ── Rooms strip ── */
    .rooms-strip {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      flex-shrink: 0;
    }

    .room-chip {
      flex: 1;
      padding: 8px 12px;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .room-chip-name {
      font-weight: 600;
      font-size: 12px;
    }

    .room-chip-meta {
      font-size: 11px;
      color: #888;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
      padding: 0 16px;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 10px 4px;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s ease;
      text-align: center;
      position: relative;
    }

    .tab-btn.active {
      color: #e5e5e5;
      border-bottom-color: #22c55e;
    }

    .tab-btn:active {
      color: #aaa;
    }

    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      border-radius: 8px;
      font-size: 9px;
      font-weight: 700;
      margin-left: 4px;
      vertical-align: middle;
    }

    .tab-badge.alert {
      background: #f97316;
      color: #000;
    }

    .tab-badge.count {
      background: #222;
      color: #888;
    }

    /* ── Content Area ── */
    .content-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }

    .tab-panel {
      display: none;
      padding: 16px;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }

    .tab-panel.active {
      display: block;
    }

    /* ── Section Headers ── */
    .section-hdr {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #555;
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #141414;
    }

    .section-hdr:first-child {
      margin-top: 0;
    }

    /* ── Stats Row (compact) ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-pill {
      text-align: center;
      padding: 12px 4px;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
    }

    .stat-pill .num {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-pill .lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-top: 4px;
    }

    .stat-pill.s-live .num { color: #22c55e; }
    .stat-pill.s-pending .num { color: #eab308; }
    .stat-pill.s-prospects .num { color: #3b82f6; }
    .stat-pill.s-actions .num { color: #f97316; }

    /* ── Action Cards (priority) ── */
    .action-card {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-left: 3px solid #f97316;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .action-card:active {
      background: #1a1a1a;
    }

    .action-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .action-card-title {
      font-size: 13px;
      font-weight: 600;
      color: #f97316;
    }

    .action-card-icon {
      font-size: 14px;
    }

    .action-card-body {
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }

    /* ── Prospect Cards ── */
    .prospect-card {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 8px;
      transition: background 0.15s;
    }

    .prospect-card.hot {
      border-color: #22c55e33;
      border-left: 3px solid #22c55e;
    }

    .prospect-card.warm {
      border-color: #3b82f633;
      border-left: 3px solid #3b82f6;
    }

    .prospect-card.stale {
      opacity: 0.6;
      border-left: 3px solid #444;
    }

    .prospect-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
      gap: 8px;
    }

    .prospect-name {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
    }

    .status-tag {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-tag.app { background: #22c55e; color: #000; }
    .status-tag.responded { background: #3b82f6; color: #fff; }
    .status-tag.tour { background: #8b5cf6; color: #fff; }
    .status-tag.stale { background: #333; color: #888; }

    .prospect-meta {
      font-size: 11px;
      color: #666;
      margin-bottom: 8px;
    }

    .prospect-summary {
      font-size: 12px;
      color: #aaa;
      line-height: 1.5;
      padding: 8px 10px;
      background: #0d0d0d;
      border-radius: 6px;
      border-left: 2px solid #222;
    }

    .prospect-action-flag {
      margin-top: 8px;
      font-size: 11px;
      color: #f97316;
      font-weight: 500;
      padding: 6px 10px;
      background: rgba(249, 115, 22, 0.08);
      border-radius: 6px;
      border-left: 2px solid #f97316;
    }

    /* ── Listing Rows ── */
    .listing-row {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 10px;
    }

    .listing-row:active {
      background: #1a1a1a;
    }

    .listing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .listing-dot.live { background: #22c55e; }
    .listing-dot.pending { background: #eab308; }
    .listing-dot.warn { background: #f97316; }
    .listing-dot.error { background: #ef4444; }
    .listing-dot.inactive { background: #444; }

    .listing-info {
      flex: 1;
      min-width: 0;
    }

    .listing-name {
      font-size: 13px;
      font-weight: 500;
    }

    .listing-detail-text {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .listing-chevron {
      color: #444;
      font-size: 12px;
      flex-shrink: 0;
    }

    .listing-expanded {
      display: none;
      padding: 10px 14px;
      margin: -2px 0 6px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-top: none;
      border-radius: 0 0 8px 8px;
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }

    .listing-expanded.open {
      display: block;
    }

    /* ── FB Group grid ── */
    .fb-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }

    .fb-chip {
      padding: 8px 10px;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .fb-chip-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    /* ── System Status ── */
    .sys-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .sys-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 6px;
    }

    .sys-name {
      font-size: 11px;
      font-weight: 500;
    }

    .sys-detail {
      font-size: 9px;
      color: #555;
      margin-top: 1px;
    }

    .sys-badge {
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .sys-badge.live { background: rgba(34,197,94,0.15); color: #22c55e; }
    .sys-badge.pending { background: rgba(234,179,8,0.15); color: #eab308; }
    .sys-badge.error { background: rgba(239,68,68,0.15); color: #ef4444; }

    /* ── Quick Links Footer ── */
    .quick-links {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0a0a0a;
      border-top: 1px solid #1a1a1a;
      padding: 6px 8px;
      padding-bottom: calc(6px + env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
      gap: 6px;
      max-width: 600px;
      margin: 0 auto;
    }

    .qlink {
      padding: 6px 12px;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      font-size: 11px;
      color: #888;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .qlink:active {
      background: #1a1a1a;
      color: #ccc;
    }

    /* ── What's New ── */
    .whats-new-card {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .whats-new-title {
      font-size: 12px;
      font-weight: 600;
      color: #22c55e;
      margin-bottom: 10px;
    }

    .wn-item {
      display: flex;
      gap: 8px;
      font-size: 12px;
      padding: 4px 0;
      line-height: 1.4;
    }

    .wn-icon { flex-shrink: 0; }
    .wn-icon.ok { color: #22c55e; }
    .wn-icon.fail { color: #ef4444; }
    .wn-text { color: #999; }

    /* ── Tours Section ── */
    .tour-card {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-left: 3px solid #8b5cf6;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .tour-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .tour-prospect {
      font-size: 13px;
      font-weight: 600;
    }

    .tour-type {
      font-size: 10px;
      color: #8b5cf6;
      font-weight: 500;
    }

    .tour-time {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
    }

    .tour-notes {
      font-size: 11px;
      color: #666;
      line-height: 1.4;
    }

    /* ── Empty states ── */
    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #444;
      font-size: 12px;
    }

    /* ── Utilities ── */
    .mb-8 { margin-bottom: 8px; }

    /* ── Desktop enhancement ── */
    @media (min-width: 640px) {
      .topbar, .rooms-strip, .tab-bar, .content-area, .quick-links {
        max-width: 600px;
      }
    }
  </style>
</head>

<body>
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-row">
      <div class="topbar-left">
        <h1>Stuart Dash</h1>
        <div class="subtitle" id="subtitle">Loading...</div>
      </div>
      <div class="topbar-right">
        <div class="update-badge">
          <span class="pulse-dot" id="pulse-dot"></span>
          <span id="update-time">Loading...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Room Chips -->
  <div class="rooms-strip" id="rooms-strip"></div>

  <!-- Tab Navigation -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="overview">Overview<span class="tab-badge alert" id="badge-actions" style="display:none"></span></button>
    <button class="tab-btn" data-tab="pipeline">Pipeline<span class="tab-badge count" id="badge-prospects" style="display:none"></span></button>
    <button class="tab-btn" data-tab="listings">Listings<span class="tab-badge count" id="badge-listings" style="display:none"></span></button>
    <button class="tab-btn" data-tab="system">System</button>
  </div>

  <!-- Content -->
  <div class="content-area">

    <!-- ═══ OVERVIEW TAB ═══ -->
    <div class="tab-panel active" id="panel-overview">
      <div class="stats-row">
        <div class="stat-pill s-live">
          <div class="num" id="s-live">0</div>
          <div class="lbl">Live</div>
        </div>
        <div class="stat-pill s-pending">
          <div class="num" id="s-pending">0</div>
          <div class="lbl">Pending</div>
        </div>
        <div class="stat-pill s-prospects">
          <div class="num" id="s-prospects">0</div>
          <div class="lbl">Prospects</div>
        </div>
        <div class="stat-pill s-actions">
          <div class="num" id="s-actions">0</div>
          <div class="lbl">Actions</div>
        </div>
      </div>

      <div id="overview-actions"></div>
      <div id="overview-whats-new"></div>
      <div id="overview-hot-prospects"></div>
      <div id="overview-tours"></div>
    </div>

    <!-- ═══ PIPELINE TAB ═══ -->
    <div class="tab-panel" id="panel-pipeline">
      <div id="pipeline-hot"></div>
      <div id="pipeline-active"></div>
      <div id="pipeline-stale"></div>
    </div>

    <!-- ═══ LISTINGS TAB ═══ -->
    <div class="tab-panel" id="panel-listings">
      <div id="listings-platforms"></div>
      <div id="listings-facebook"></div>
    </div>

    <!-- ═══ SYSTEM TAB ═══ -->
    <div class="tab-panel" id="panel-system">
      <div id="system-grid"></div>
    </div>
  </div>

  <!-- Quick Links -->
  <div class="quick-links">
    <a class="qlink" href="https://mail.google.com/mail/u/0/" target="_blank">Email</a>
    <a class="qlink" href="https://www.spareroom.com.au/" target="_blank">SpareRoom</a>
    <a class="qlink" href="https://www.zillow.com/rental-manager/" target="_blank">Zillow</a>
    <a class="qlink" href="https://www.facebook.com/marketplace/" target="_blank">FB Mkt</a>
  </div>

  <script>
    let state = { data: null, fetchTime: null, expanded: {} };

    document.addEventListener('DOMContentLoaded', () => {
      init();
      setInterval(fetchAndRender, 120000);
      setInterval(updateTimestamp, 30000);
    });

    async function init() {
      await fetchData();
      render();
      setupTabs();
    }

    async function fetchData() {
      try {
        document.getElementById('pulse-dot').style.animation = 'none';
        const r = await fetch('data.json?_=' + Date.now());
        if (!r.ok) throw new Error('fetch failed');
        state.data = await r.json();
        state.fetchTime = new Date();
        document.getElementById('pulse-dot').style.animation = '';
        updateTimestamp();
      } catch (e) {
        console.error(e);
        document.getElementById('update-time').textContent = 'Offline';
        document.getElementById('pulse-dot').classList.add('error');
      }
    }

    function fetchAndRender() { fetchData().then(render); }

    function updateTimestamp() {
      if (!state.fetchTime) return;
      const mins = Math.floor((Date.now() - state.fetchTime) / 60000);
      const el = document.getElementById('update-time');
      const dot = document.getElementById('pulse-dot');
      if (mins === 0) el.textContent = 'Just now';
      else if (mins < 60) el.textContent = mins + 'm ago';
      else el.textContent = Math.floor(mins / 60) + 'h ago';
      dot.className = 'pulse-dot' + (mins > 120 ? ' error' : mins > 60 ? ' stale' : '');
    }

    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
        });
      });
    }

    function render() {
      if (!state.data) return;
      const d = state.data;

      // Subtitle
      document.getElementById('subtitle').textContent = d.property.subtitle + ' · ' + d.property.address;

      // Rooms
      const rs = document.getElementById('rooms-strip');
      rs.innerHTML = d.property.rooms.map(r => `
        <div class="room-chip">
          <span class="room-chip-name">${r.name}</span>
          <span class="room-chip-meta">$${r.price} · ${r.availableDate}</span>
        </div>
      `).join('');

      // Stats
      document.getElementById('s-live').textContent = d.stats.live;
      document.getElementById('s-pending').textContent = d.stats.pending;
      document.getElementById('s-prospects').textContent = d.stats.prospects;
      document.getElementById('s-actions').textContent = d.stats.actions;

      // Badges
      if (d.stats.actions > 0) {
        const b = document.getElementById('badge-actions');
        b.textContent = d.stats.actions;
        b.style.display = '';
      }
      if (d.stats.prospects > 0) {
        const b = document.getElementById('badge-prospects');
        b.textContent = d.stats.prospects;
        b.style.display = '';
      }
      const totalListings = (d.listings || []).filter(l => l.status !== 'inactive').length;
      if (totalListings > 0) {
        const b = document.getElementById('badge-listings');
        b.textContent = totalListings;
        b.style.display = '';
      }

      renderOverview(d);
      renderPipeline(d);
      renderListings(d);
      renderSystem(d);
    }

    // ═══════════════════════════════
    // OVERVIEW TAB
    // ═══════════════════════════════
    function renderOverview(d) {
      // Actions
      const ac = document.getElementById('overview-actions');
      const actions = d.actions || [];
      if (actions.length) {
        ac.innerHTML = '<div class="section-hdr">Needs Your Attention</div>' +
          actions.map(a => `
            <div class="action-card">
              <div class="action-card-top">
                <span class="action-card-title">${a.priority}</span>
                <span class="action-card-icon">${a.icon}</span>
              </div>
              <div class="action-card-body">${a.text}</div>
            </div>
          `).join('');
      } else {
        ac.innerHTML = '';
      }

      // What's New
      const wn = document.getElementById('overview-whats-new');
      const log = d.log;
      if (log && ((log.worked && log.worked.length) || (log.failed && log.failed.length))) {
        let items = '';
        (log.worked || []).slice(0, 3).forEach(w => {
          items += `<div class="wn-item"><span class="wn-icon ok">✓</span><span class="wn-text">${w}</span></div>`;
        });
        (log.failed || []).slice(0, 2).forEach(f => {
          items += `<div class="wn-item"><span class="wn-icon fail">✕</span><span class="wn-text">${f}</span></div>`;
        });
        wn.innerHTML = `
          <div class="section-hdr">What's New</div>
          <div class="whats-new-card">
            <div class="whats-new-title">Updates from ${log.date}</div>
            ${items}
          </div>
        `;
      } else {
        wn.innerHTML = '';
      }

      // Hot Prospects (top 3 only on overview)
      const hp = document.getElementById('overview-hot-prospects');
      const hotProspects = categorizeProspects(d.prospects).hot.slice(0, 3);
      if (hotProspects.length) {
        hp.innerHTML = '<div class="section-hdr">Top Prospects</div>' +
          hotProspects.map(p => renderProspectCard(p, 'hot')).join('');
      } else {
        hp.innerHTML = '';
      }

      // Tours
      const tc = document.getElementById('overview-tours');
      const tours = d.tours || {};
      const scheduled = tours.scheduled || [];
      const completed = tours.completed || [];
      if (scheduled.length || completed.length) {
        let html = '<div class="section-hdr">Tours</div>';
        scheduled.forEach(t => {
          html += `
            <div class="tour-card">
              <div class="tour-card-top">
                <span class="tour-prospect">${t.prospect}</span>
                <span class="tour-type">${t.type}</span>
              </div>
              <div class="tour-time">${t.date} ${t.time} · ${t.confirmed}</div>
              <div class="tour-notes">${t.notes || ''}</div>
            </div>
          `;
        });
        completed.slice(0, 2).forEach(t => {
          html += `
            <div class="tour-card" style="border-left-color:#444;opacity:0.7">
              <div class="tour-card-top">
                <span class="tour-prospect">${t.prospect}</span>
                <span class="tour-type">${t.type}</span>
              </div>
              <div class="tour-time">${t.date} ${t.time}</div>
              <div class="tour-notes">${t.outcome || ''}</div>
            </div>
          `;
        });
        tc.innerHTML = html;
      } else {
        tc.innerHTML = '';
      }
    }

    // ═══════════════════════════════
    // PIPELINE TAB
    // ═══════════════════════════════
    function categorizeProspects(prospects) {
      const hot = [], active = [], stale = [];
      (prospects || []).filter(p => p.active).forEach(p => {
        const s = (p.status || '').toUpperCase();
        if (s.includes('APPLICATION') || s.includes('TOUR SCHED') || s.includes('TOURED')) {
          hot.push(p);
        } else if (s.includes('STALE') || s.includes('ARCHIVED')) {
          stale.push(p);
        } else {
          active.push(p);
        }
      });
      return { hot, active, stale };
    }

    function renderProspectCard(p, tier) {
      const s = (p.status || '').toUpperCase();
      let tagClass = 'responded';
      if (s.includes('APPLICATION')) tagClass = 'app';
      else if (s.includes('TOUR')) tagClass = 'tour';
      else if (s.includes('STALE') || s.includes('ARCHIVED')) tagClass = 'stale';

      // Clean status label
      let label = p.status.replace(/[✅❌⚠️📨🔍]/g, '').trim();
      if (label.length > 24) label = label.substring(0, 24);

      const notes = p.notes || '';
      const firstSentence = notes.split(/\.\s/)[0];
      const summary = firstSentence ? (firstSentence.length > 160 ? firstSentence.substring(0, 157) + '...' : firstSentence + '.') : '';

      let html = `
        <div class="prospect-card ${tier}">
          <div class="prospect-top">
            <span class="prospect-name">${p.name}</span>
            <span class="status-tag ${tagClass}">${label}</span>
          </div>
          <div class="prospect-meta">${p.source || ''}${p.date ? ' · ' + p.date : ''}</div>
      `;
      if (summary) {
        html += `<div class="prospect-summary">${summary}</div>`;
      }
      if (p.actionNeeded) {
        html += `<div class="prospect-action-flag">${p.actionNeeded}</div>`;
      }
      html += '</div>';
      return html;
    }

    function renderPipeline(d) {
      const { hot, active, stale } = categorizeProspects(d.prospects);

      const hc = document.getElementById('pipeline-hot');
      if (hot.length) {
        hc.innerHTML = '<div class="section-hdr">Hot Leads</div>' + hot.map(p => renderProspectCard(p, 'hot')).join('');
      } else {
        hc.innerHTML = '<div class="section-hdr">Hot Leads</div><div class="empty-state">No hot leads right now</div>';
      }

      const ac = document.getElementById('pipeline-active');
      if (active.length) {
        ac.innerHTML = '<div class="section-hdr">Active</div>' + active.map(p => renderProspectCard(p, 'warm')).join('');
      } else {
        ac.innerHTML = '';
      }

      const sc = document.getElementById('pipeline-stale');
      if (stale.length) {
        sc.innerHTML = '<div class="section-hdr">Stale / Archived</div>' + stale.map(p => renderProspectCard(p, 'stale')).join('');
      } else {
        sc.innerHTML = '';
      }
    }

    // ═══════════════════════════════
    // LISTINGS TAB
    // ═══════════════════════════════
    function renderListings(d) {
      const listings = d.listings || [];
      const platforms = listings.filter(l => l.category === 'platform');
      const fbGroups = listings.filter(l => l.category === 'facebook_group');

      // Platforms
      const pc = document.getElementById('listings-platforms');
      if (platforms.length) {
        pc.innerHTML = '<div class="section-hdr">Platforms</div>' +
          platforms.map(l => `
            <div class="listing-row" onclick="toggleListing('${l.id}')">
              <span class="listing-dot ${l.status}"></span>
              <div class="listing-info">
                <div class="listing-name">${l.name}</div>
                <div class="listing-detail-text">${(l.notes || '').substring(0, 60)}...</div>
              </div>
              <span class="listing-chevron" id="chev-${l.id}">›</span>
            </div>
            <div class="listing-expanded" id="exp-${l.id}">${l.detail}</div>
          `).join('');
      }

      // Facebook Groups
      const fc = document.getElementById('listings-facebook');
      if (fbGroups.length) {
        const live = fbGroups.filter(g => g.status === 'live').length;
        const pending = fbGroups.filter(g => g.status === 'pending').length;
        const inactive = fbGroups.filter(g => g.status === 'inactive').length;

        fc.innerHTML = `
          <div class="section-hdr">Facebook Groups · ${live} live · ${pending} pending</div>
          <div class="fb-grid">
            ${fbGroups.map(g => `
              <div class="fb-chip">
                <span class="listing-dot ${g.status}" style="width:6px;height:6px"></span>
                <span class="fb-chip-name" title="${g.name}">${g.name.replace(/\s*\([\d.]+K\)/g, '')}</span>
              </div>
            `).join('')}
          </div>
        `;
      }
    }

    function toggleListing(id) {
      const exp = document.getElementById('exp-' + id);
      const chev = document.getElementById('chev-' + id);
      if (exp) {
        const isOpen = exp.classList.toggle('open');
        if (chev) chev.style.transform = isOpen ? 'rotate(90deg)' : '';
      }
    }

    // ═══════════════════════════════
    // SYSTEM TAB
    // ═══════════════════════════════
    function renderSystem(d) {
      const systems = d.system || [];
      const container = document.getElementById('system-grid');
      if (!systems.length) {
        container.innerHTML = '<div class="empty-state">No system data</div>';
        return;
      }

      container.innerHTML = '<div class="section-hdr">Automation Status</div><div class="sys-grid">' +
        systems.map(s => `
          <div class="sys-item">
            <div>
              <div class="sys-name">${s.name}</div>
              <div class="sys-detail">${s.detail}</div>
            </div>
            <span class="sys-badge ${s.status}">${s.status}</span>
          </div>
        `).join('') + '</div>';
    }
  </script>
</body>
</html>
