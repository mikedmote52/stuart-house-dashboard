<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stuart Dash" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Stuart Dash - Rental Manager</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
    }

    body {
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }

    main {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .container {
      padding: 16px;
      padding-bottom: 80px;
      width: 100%;
    }

    /* Header & Update Status */
    .header {
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
    }

    .header-updated {
      font-size: 11px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-updated.stale {
      color: #f97316;
    }

    .header-updated.very-stale {
      color: #ef4444;
    }

    .refresh-indicator {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    .refresh-indicator.refreshing {
      animation: spin 1s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Room Pills */
    .rooms {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .room-pill {
      flex: 1;
      min-width: 140px;
      padding: 12px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .room-pill:active {
      transform: scale(0.98);
    }

    .room-pill-name {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .room-pill-meta {
      font-size: 11px;
      color: #888;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      padding: 16px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      text-align: center;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-card.live .stat-number {
      color: #22c55e;
    }

    .stat-card.pending .stat-number {
      color: #eab308;
    }

    .stat-card.prospects .stat-number {
      color: #3b82f6;
    }

    .stat-card.actions .stat-number {
      color: #f97316;
    }

    /* Prospect Spotlight */
    .section-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin: 24px 0 12px 0;
      padding-top: 12px;
      border-top: 1px solid #1a1a1a;
    }

    .prospects-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .prospect-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 16px;
      transition: all 0.2s ease;
    }

    .prospect-card:active {
      transform: scale(0.98);
    }

    .prospect-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .prospect-name {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }

    .prospect-status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .prospect-status-badge.screening {
      background: #3b82f6;
      color: #fff;
    }

    .prospect-status-badge.responded {
      background: #eab308;
      color: #000;
    }

    .prospect-status-badge.qualified {
      background: #22c55e;
      color: #000;
    }

    .prospect-profile {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .prospect-match {
      margin-bottom: 12px;
    }

    .prospect-match-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .match-bar {
      width: 100%;
      height: 6px;
      background: #1a1a1a;
      border-radius: 3px;
      overflow: hidden;
    }

    .match-bar-fill {
      height: 100%;
      background: #22c55e;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .match-bar-fill.ok {
      background: #eab308;
    }

    .match-bar-fill.poor {
      background: #ef4444;
    }

    .prospect-message {
      background: #0a0a0a;
      border-left: 3px solid #3b82f6;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 12px;
      font-style: italic;
      color: #bbb;
      line-height: 1.4;
    }

    .prospect-conversation {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
      padding: 8px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .prospect-action {
      font-size: 12px;
      color: #f97316;
      font-weight: 500;
      padding: 8px;
      background: rgba(249, 115, 22, 0.1);
      border-radius: 4px;
      border-left: 2px solid #f97316;
    }

    /* What's New Section */
    .whats-new {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .whats-new-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #22c55e;
    }

    .whats-new-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .whats-new-item {
      font-size: 12px;
      display: flex;
      gap: 8px;
      padding: 8px 0;
      line-height: 1.4;
    }

    .whats-new-item-icon {
      display: flex;
      align-items: flex-start;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .whats-new-item.success .whats-new-item-icon {
      color: #22c55e;
    }

    .whats-new-item.failure .whats-new-item-icon {
      color: #ef4444;
    }

    .whats-new-item-text {
      flex: 1;
      color: #aaa;
    }

    /* Actions Section */
    .actions-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    .action-item {
      background: #141414;
      border-left: 3px solid #f97316;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action-item:active {
      transform: translateX(2px);
    }

    .action-priority {
      font-weight: 600;
      margin-bottom: 4px;
      color: #f97316;
    }

    .action-text {
      color: #aaa;
      line-height: 1.4;
    }

    /* Listings Accordion */
    .listings-section {
      margin-bottom: 24px;
    }

    .accordion-group {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .accordion-header {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      background: #141414;
      border: none;
      width: 100%;
      font-size: 13px;
      font-weight: 500;
      color: #e5e5e5;
      transition: all 0.2s ease;
    }

    .accordion-header:active {
      background: #1a1a1a;
    }

    .accordion-header .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .accordion-header .status-dot.live {
      background: #22c55e;
    }

    .accordion-header .status-dot.pending {
      background: #eab308;
    }

    .accordion-header .status-dot.warn {
      background: #f97316;
    }

    .accordion-header .status-dot.error {
      background: #ef4444;
    }

    .accordion-header .status-dot.inactive {
      background: #666;
    }

    .accordion-toggle {
      font-size: 10px;
      color: #666;
      transition: transform 0.2s ease;
    }

    .accordion-toggle.open {
      transform: rotate(90deg);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: #0a0a0a;
    }

    .accordion-content.open {
      max-height: 500px;
    }

    .accordion-detail {
      padding: 12px;
      font-size: 11px;
      color: #888;
      line-height: 1.5;
      border-top: 1px solid #1a1a1a;
    }

    .facebook-groups-summary {
      font-size: 12px;
      color: #aaa;
      padding: 8px 0;
    }

    /* System Status */
    .system-status {
      margin-bottom: 24px;
    }

    .system-item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 6px;
    }

    .system-item-name {
      font-weight: 500;
    }

    .system-item-status {
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
    }

    .system-item-status.live {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .system-item-status.error {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .system-item-status.pending {
      background: rgba(235, 179, 8, 0.2);
      color: #eab308;
    }

    /* Bottom Navigation */
    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50px;
      padding-bottom: env(safe-area-inset-bottom);
      background: #0a0a0a;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-around;
      align-items: center;
      max-width: 480px;
      margin: 0 auto;
    }

    nav a {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #666;
      font-size: 11px;
      text-align: center;
      transition: color 0.2s ease;
    }

    nav a:active {
      color: #22c55e;
    }

    /* Pull to Refresh */
    .pull-to-refresh {
      position: relative;
      top: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 20px 16px;
      color: #666;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .pull-to-refresh.pulling {
      color: #22c55e;
    }

    /* Empty State */
    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: #666;
      font-size: 12px;
    }

    /* Loading/Error States */
    .error-message {
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      border-radius: 4px;
      color: #ef4444;
      font-size: 12px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
<!--
  STUART HOUSE STALENESS BANNER
  Inject this block immediately after <body> in index.html.

  It fetches data.json on its own schedule (every 60s), reads lastUpdated,
  and shows a loud banner if the data is older than STALE_MINUTES.

  The existing dashboard keeps rendering as before. This is a parallel
  truth-channel that does not trust the dashboard's own rendering path.

  THRESHOLDS (tune here, not inline):
    WARN_MINUTES  = 90   yellow banner: worth noticing
    STALE_MINUTES = 180  red banner: something is wrong
    DEAD_MINUTES  = 360  flashing red: publisher is broken

  Tie these to the morning-sweep cadence. The sweep runs 8am PT, so any
  gap beyond 3 hours in the middle of the business day is abnormal.
-->
<style>
  #sh-staleness-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 99999;
    padding: 12px 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    transition: background-color 0.3s;
    display: none;
  }
  #sh-staleness-banner.visible { display: block; }
  #sh-staleness-banner.warn   { background: #b58900; }
  #sh-staleness-banner.stale  { background: #c0392b; }
  #sh-staleness-banner.dead   { background: #8b0000; animation: sh-pulse 1.2s infinite; }
  #sh-staleness-banner.fetch-fail { background: #4a0e4e; }
  #sh-staleness-banner a {
    color: #fff;
    text-decoration: underline;
    margin-left: 12px;
  }
  @keyframes sh-pulse {
    0%, 100% { background: #8b0000; }
    50%      { background: #ff1a1a; }
  }
  /* push page content down when banner is visible */
  body.sh-banner-visible { padding-top: 56px; }
</style>

<div id="sh-staleness-banner" role="alert" aria-live="assertive">
  <span id="sh-staleness-message">Checking data freshness…</span>
  <a href="#" id="sh-staleness-refresh" onclick="window.shStalenessCheck(); return false;">recheck</a>
</div>

<script>
(function () {
  var WARN_MINUTES  = 90;
  var STALE_MINUTES = 180;
  var DEAD_MINUTES  = 360;
  var POLL_INTERVAL_MS = 60 * 1000;
  var DATA_URL = 'data.json?ts=' + Date.now();

  var banner  = document.getElementById('sh-staleness-banner');
  var message = document.getElementById('sh-staleness-message');

  function setState(cls, text) {
    banner.className = '';
    banner.classList.add('visible', cls);
    document.body.classList.add('sh-banner-visible');
    message.textContent = text;
  }
  function hide() {
    banner.className = '';
    document.body.classList.remove('sh-banner-visible');
  }

  function fmtAge(min) {
    if (min < 60) return min + ' min';
    var h = Math.floor(min / 60);
    var m = min % 60;
    return h + 'h ' + m + 'm';
  }

  window.shStalenessCheck = function () {
    fetch('data.json?ts=' + Date.now(), { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (data) {
        var raw = data.lastUpdated || data.generated_at || data.timestamp;
        if (!raw) {
          setState('fetch-fail', 'data.json has no timestamp field. Publisher is broken.');
          return;
        }
        var ts  = new Date(raw).getTime();
        var now = Date.now();
        var ageMin = Math.round((now - ts) / 60000);

        if (ageMin < 0) {
          // clock skew, treat as fresh
          hide();
          return;
        }
        if (ageMin >= DEAD_MINUTES) {
          setState('dead',
            'DATA ' + fmtAge(ageMin) + ' STALE. Morning sweep has not run. ' +
            'Chrome sessions likely logged out. Check auth-monitor.');
        } else if (ageMin >= STALE_MINUTES) {
          setState('stale',
            'Data is ' + fmtAge(ageMin) + ' stale. Expected < 3h during the day. ' +
            'Likely scraper/auth failure.');
        } else if (ageMin >= WARN_MINUTES) {
          setState('warn',
            'Data is ' + fmtAge(ageMin) + ' old. Refresh expected soon.');
        } else {
          hide();
        }
      })
      .catch(function (err) {
        setState('fetch-fail',
          'Cannot fetch data.json (' + err.message + '). ' +
          'Dashboard cannot verify freshness.');
      });
  };

  // first check immediately, then poll
  window.shStalenessCheck();
  setInterval(window.shStalenessCheck, POLL_INTERVAL_MS);
})();
</script>
<!-- END STUART HOUSE STALENESS BANNER -->

  <main>
    <div class="container">
      <!-- Header with Update Status -->
      <div class="header">
        <div>
          <h1 class="header-title">Stuart Dash</h1>
          <p class="header-subtitle" id="property-subtitle">Loading...</p>
          <div class="header-updated">
            <span class="refresh-indicator" id="refresh-dot"></span>
            <span id="updated-text">Loading...</span>
          </div>
        </div>
      </div>

      <!-- Room Pills -->
      <div class="rooms" id="rooms-container"></div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card live">
          <div class="stat-number" id="stat-live">0</div>
          <div class="stat-label">Live</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-number" id="stat-pending">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card prospects">
          <div class="stat-number" id="stat-prospects">0</div>
          <div class="stat-label">Prospects</div>
        </div>
        <div class="stat-card actions">
          <div class="stat-number" id="stat-actions">0</div>
          <div class="stat-label">Actions</div>
        </div>
      </div>

      <!-- Prospect Spotlight -->
      <div id="prospect-section"></div>

      <!-- What's New -->
      <div id="whats-new-section"></div>

  </main>

  <nav>
    <a href="#dashboard">Dashboard</a>
    <a href="https://docs.google.com/document/d/1pPjH2pPQw3hT8F4fYz0eN9m6K7x4lL3v0aB3cD5eF6g/edit" target="_blank">Call Line</a>
    <a href="https://docs.google.com/document/d/1qQ0iI5sT9u7vW2xY3zZ4aA5bB6cC7dD8eE9fF0gG1h/edit" target="_blank">CL Listing</a>

  <script>
    // State management
    let appState = {
      data: null,
      lastFetchTime: null,
      lastLogDate: null,
      expandedSections: {}
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      init();
      setInterval(() => refreshData(), 2 * 60 * 1000); // Auto-refresh every 2 minutes
    });

    async function init() {
      await fetchData();
      render();
    }

    async function fetchData() {
      try {
        const dot = document.getElementById('refresh-dot');
        dot.classList.add('refreshing');

        const response = await fetch('data.json');
        if (!response.ok) throw new Error('Network response was not ok');
        appState.data = await response.json();
        appState.lastFetchTime = new Date();

        dot.classList.remove('refreshing');
        updateLastUpdatedTime();
      } catch (error) {
        console.error('Error fetching data:', error);
        document.querySelector('.error-message')?.remove();
        const errorEl = document.createElement('div');
        errorEl.className = 'error-message';
        errorEl.textContent = 'Failed to load data. Check your connection.';
        document.querySelector('.container').prepend(errorEl);
      }
    }

    function refreshData() {
      fetchData();
      render();
    }

    function updateLastUpdatedTime() {
      if (!appState.lastFetchTime) return;

      const now = new Date();
      const diff = Math.floor((now - appState.lastFetchTime) / 1000 / 60); // minutes
      const text = document.getElementById('updated-text');
      const dot = document.getElementById('refresh-dot');

      if (diff === 0) {
        text.textContent = 'Updated just now';
      } else if (diff === 1) {
        text.textContent = 'Updated 1 min ago';
      } else if (diff < 60) {
        text.textContent = `Updated ${diff} min ago`;
      } else if (diff < 120) {
        text.textContent = 'Updated 1h ago';
      } else {
        text.textContent = `Updated ${Math.floor(diff / 60)}h ago`;
      }

      // Staleness warning
      if (diff > 120) {
        text.classList.add('very-stale');
      } else if (diff > 90) {
        text.classList.add('stale');
      } else {
        text.classList.remove('stale', 'very-stale');
      }
    }

    function render() {
      if (!appState.data) return;

      renderHeader();
      renderRooms();
      renderStats();
      renderProspectSpotlight();
      renderWhatsNew();
      renderActions();
      renderListings();
      renderFacebookGroups();
      renderSystemStatus();

      // Update timestamp periodically
      setInterval(updateLastUpdatedTime, 30000);
    }

    function renderHeader() {
      const data = appState.data;
      document.getElementById('property-subtitle').textContent =
        data.property.subtitle + ' · ' + data.property.address;
    }

    function renderRooms() {
      const container = document.getElementById('rooms-container');
      container.innerHTML = '';

      appState.data.property.rooms.forEach(room => {
        const pill = document.createElement('div');
        pill.className = 'room-pill';
        pill.innerHTML = `
          <div class="room-pill-name">${room.name}</div>
          <div class="room-pill-meta">$${room.price}/mo · ${room.availableDate}</div>
        `;
        container.appendChild(pill);
      });
    }

    function renderStats() {
      const stats = appState.data.stats;
      document.getElementById('stat-live').textContent = stats.live;
      document.getElementById('stat-pending').textContent = stats.pending;
      document.getElementById('stat-prospects').textContent = stats.prospects;
      document.getElementById('stat-actions').textContent = stats.actions;
    }

    function renderProspectSpotlight() {
      const container = document.getElementById('prospect-section');
      const activeProspects = appState.data.prospects.filter(p => p.active);

      if (activeProspects.length === 0) {
        container.innerHTML = '<div class="empty-state">No active prospects</div>';
        return;
      }

      container.innerHTML = `<h2 class="section-title">Active Prospects</h2>`;

      const prospectsHtml = document.createElement('div');
      prospectsHtml.className = 'prospects-container';

      activeProspects.forEach(prospect => {
        const statusClass = prospect.status === 'SCREENING' ? 'screening' :
                          prospect.status === 'RESPONDED' ? 'responded' : 'qualified';

        // Build profile summary
        const profile = prospect.profile || 'Profile pending';
        const matchAssessment = prospect.matchAssessment || 'Not yet assessed';
        const lastMessage = prospect.lastMessage || 'No messages yet';
        const conversationStage = prospect.conversationStage || 'Initial contact';

        // Determine match bar fill level
        let matchLevel = 0.7; // default
        let matchClass = '';
        if (matchAssessment.includes('excellent') || matchAssessment.includes('excellent')) {
          matchLevel = 0.9;
          matchClass = '';
        } else if (matchAssessment.includes('good')) {
          matchLevel = 0.75;
          matchClass = '';
        } else if (matchAssessment.includes('ok') || matchAssessment.includes('moderate')) {
          matchLevel = 0.5;
          matchClass = 'ok';
        } else if (matchAssessment.includes('poor') || matchAssessment.includes('weak')) {
          matchLevel = 0.3;
          matchClass = 'poor';
        }

        const card = document.createElement('div');
        card.className = 'prospect-card';
        card.innerHTML = `
          <div class="prospect-header">
            <div class="prospect-name">${prospect.name}</div>
            <span class="prospect-status-badge ${statusClass}">${prospect.status}</span>
          </div>

          <div class="prospect-profile">
            ${profile}
          </div>

          <div class="prospect-match">
            <div class="prospect-match-label">
              <span>Match Quality</span>
              <span>${matchAssessment}</span>
            </div>
            <div class="match-bar">
              <div class="match-bar-fill ${matchClass}" style="width: ${matchLevel * 100}%"></div>
            </div>
          </div>

          <div class="prospect-message">
            "${lastMessage}"
          </div>

          <div class="prospect-conversation">
            ${conversationStage}
          </div>

          <div class="prospect-action">
            🔔 ${prospect.actionNeeded}
          </div>
        `;

        prospectsHtml.appendChild(card);
      });

      container.appendChild(prospectsHtml);
    }

    function renderWhatsNew() {
      const container = document.getElementById('whats-new-section');
      const log = appState.data.log;

      if (!log || (!log.worked || log.worked.length === 0) && (!log.failed || log.failed.length === 0)) {
        container.innerHTML = '';
        return;
      }

      let html = `
        <h2 class="section-title">What's New</h2>
        <div class="whats-new">
          <div class="whats-new-title">Latest Updates from ${log.date}</div>
          <div class="whats-new-list">
      `;

      if (log.worked && log.worked.length > 0) {
        log.worked.slice(0, 3).forEach(item => {
          html += `
            <div class="whats-new-item success">
              <div class="whats-new-item-icon">✓</div>
              <div class="whats-new-item-text">${item}</div>
            </div>
          `;
        });
      }

      if (log.failed && log.failed.length > 0) {
        log.failed.slice(0, 2).forEach(item => {
          html += `
            <div class="whats-new-item failure">
              <div class="whats-new-item-icon">✕</div>
              <div class="whats-new-item-text">${item}</div>
            </div>
          `;
        });
      }

      html += `
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    function renderActions() {
      const container = document.getElementById('actions-section');
      const actions = appState.data.actions || [];

      if (actions.length === 0) {
        container.innerHTML = '';
        return;
      }

      let html = '<h2 class="section-title">Action Items</h2><div class="actions-container">';

      actions.forEach(action => {
        html += `
          <div class="action-item">
            <div class="action-priority">${action.icon} ${action.priority}</div>
            <div class="action-text">${action.text}</div>
          </div>
        `;
      });

      html += '</div>';
      container.innerHTML = html;
    }

    function renderListings() {
      const container = document.getElementById('listings-section');
      const listings = appState.data.listings || [];
      const platforms = listings.filter(l => l.category === 'platform');

      if (platforms.length === 0) return;

      let html = '<h2 class="section-title">Platforms</h2>';

      platforms.forEach((listing, idx) => {
        const isOpen = appState.expandedSections[listing.id] || false;
        const statusDot = `<span class="status-dot ${listing.status}"></span>`;

        html += `
          <div class="accordion-group">
            <button class="accordion-header" onclick="toggleAccordion('${listing.id}')">
              <span>${statusDot}${listing.name}</span>
              <span class="accordion-toggle ${isOpen ? 'open' : ''}">›</span>
            </button>
            <div class="accordion-content ${isOpen ? 'open' : ''}" id="content-${listing.id}">
              <div class="accordion-detail">${listing.detail}</div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function renderFacebookGroups() {
      const container = document.getElementById('facebook-groups-section');
      const listings = appState.data.listings || [];
      const fbGroups = listings.filter(l => l.category === 'facebook_group');

      if (fbGroups.length === 0) return;

      const live = fbGroups.filter(l => l.status === 'live').length;
      const pending = fbGroups.filter(l => l.status === 'pending').length;
      const warn = fbGroups.filter(l => l.status === 'warn').length;

      let html = `
        <h2 class="section-title">Facebook Groups</h2>
        <div class="accordion-group">
          <button class="accordion-header" onclick="toggleAccordion('fb-groups')">
            <span><span class="status-dot live"></span>Facebook Groups</span>
            <span class="accordion-toggle ${appState.expandedSections['fb-groups'] ? 'open' : ''}">›</span>
          </button>
          <div class="accordion-content ${appState.expandedSections['fb-groups'] ? 'open' : ''}" id="content-fb-groups">
            <div class="accordion-detail">
              <div class="facebook-groups-summary">
                <strong>${live}</strong> live · <strong>${pending}</strong> pending · <strong>${warn}</strong> needs action
              </div>
      `;

      fbGroups.forEach(group => {
        const statusDot = `<span class="status-dot ${group.status}"></span>`;
        html += `
          <div style="padding: 10px 0; border-top: 1px solid #1a1a1a; font-size: 11px;">
            ${statusDot}<strong>${group.name}</strong><br/>
            <span style="color: #666;">${group.detail}</span>
          </div>
        `;
      });

      html += `
            </div>
          </div>
        </div>
      `;

      container.innerHTML = html;
    }

    function renderSystemStatus() {
      const container = document.getElementById('system-section');
      const systems = appState.data.system || [];

      if (systems.length === 0) return;

      let html = '<h2 class="section-title">System Status</h2><div class="system-status">';

      systems.forEach(sys => {
        html += `
          <div class="system-item">
            <div>
              <div class="system-item-name">${sys.name}</div>
              <div style="color: #666; font-size: 10px; margin-top: 2px;">${sys.detail}</div>
            </div>
            <span class="system-item-status ${sys.status}">${sys.status.toUpperCase()}</span>
          </div>
        `;
      });

      html += '</div>';
      container.innerHTML = html;
    }

    function toggleAccordion(id) {
      appState.expandedSections[id] = !appState.expandedSections[id];
      const content = document.getElementById(`content-${id}`);
      const toggle = content?.parentElement?.querySelector('.accordion-toggle');

      if (content) {
        content.classList.toggle('open');
      }
      if (toggle) {
        toggle.classList.toggle('open');
      }
    }

    // Pull-to-refresh gesture
    let touchStartY = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    });

    document.addEventListener('touchmove', (e) => {
      if (document.querySelector('main').scrollTop === 0) {
        const touchCurrentY = e.touches[0].clientY;
        const diff = touchCurrentY - touchStartY;

        if (diff > 60) {
          refreshData();
          touchStartY = touchCurrentY; // Reset to prevent multiple triggers
        }
      }
    });
  </script>
</body>
</html>
