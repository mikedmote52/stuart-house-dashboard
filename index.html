<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stuart Dash" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Stuart Dash</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; height:100%; font-family:-apple-system,system-ui,'Segoe UI',sans-serif; background:#0a0a0a; color:#e5e5e5; overflow:hidden; }
    body { display:flex; flex-direction:column; padding-top:env(safe-area-inset-top); padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right); }

    /* ── Stale Banner ── */
    .stale-banner { display:none; padding:10px 16px; background:rgba(239,68,68,0.12); border-bottom:1px solid rgba(239,68,68,0.25); text-align:center; font-size:12px; color:#ef4444; max-width:600px; width:100%; margin:0 auto; flex-shrink:0; }
    .stale-banner.visible { display:block; }
    .stale-banner .age { font-weight:700; }

    /* ── Top Bar ── */
    .topbar { padding:12px 16px 0; max-width:600px; width:100%; margin:0 auto; flex-shrink:0; }
    .topbar-row { display:flex; justify-content:space-between; align-items:center; }
    .topbar-left h1 { font-size:18px; font-weight:700; letter-spacing:-0.3px; }
    .topbar-left .subtitle { font-size:11px; color:#666; margin-top:2px; }
    .update-badge { display:inline-flex; align-items:center; gap:5px; font-size:10px; color:#666; background:#141414; border:1px solid #1e1e1e; padding:4px 8px; border-radius:12px; }
    .pulse-dot { width:6px; height:6px; border-radius:50%; background:#22c55e; animation:pulse 2s ease-in-out infinite; }
    .pulse-dot.stale { background:#f97316; }
    .pulse-dot.error { background:#ef4444; }
    @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }

    /* ── Room Chips ── */
    .rooms-strip { display:flex; gap:8px; padding:10px 16px; max-width:600px; width:100%; margin:0 auto; flex-shrink:0; }
    .room-chip { flex:1; padding:6px 10px; background:#141414; border:1px solid #1e1e1e; border-radius:6px; font-size:11px; display:flex; justify-content:space-between; align-items:center; }
    .room-chip-name { font-weight:600; }
    .room-chip-meta { font-size:10px; color:#888; }

    /* ── Tab Bar ── */
    .tab-bar { display:flex; max-width:600px; width:100%; margin:0 auto; border-bottom:1px solid #1a1a1a; flex-shrink:0; padding:0 16px; gap:4px; }
    .tab-btn { flex:1; background:none; border:none; padding:10px 4px; font-size:12px; font-weight:500; color:#666; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s ease; text-align:center; }
    .tab-btn.active { color:#e5e5e5; border-bottom-color:#22c55e; }
    .tab-badge { display:inline-flex; align-items:center; justify-content:center; min-width:16px; height:16px; padding:0 4px; border-radius:8px; font-size:9px; font-weight:700; margin-left:4px; vertical-align:middle; }
    .tab-badge.alert { background:#f97316; color:#000; }
    .tab-badge.count { background:#222; color:#888; }

    /* ── Content Area ── */
    .content-area { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; max-width:600px; width:100%; margin:0 auto; }
    .tab-panel { display:none; padding:16px; padding-bottom:calc(60px + env(safe-area-inset-bottom)); }
    .tab-panel.active { display:block; }

    /* ── Section Headers ── */
    .section-hdr { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:#555; margin:20px 0 8px; padding-bottom:4px; border-bottom:1px solid #141414; }
    .section-hdr:first-child { margin-top:0; }

    /* ── Stats Row ── */
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:14px; }
    .stat-pill { text-align:center; padding:10px 4px; background:#141414; border:1px solid #1e1e1e; border-radius:6px; }
    .stat-pill .num { font-size:20px; font-weight:700; line-height:1; }
    .stat-pill .lbl { font-size:9px; text-transform:uppercase; letter-spacing:0.5px; color:#666; margin-top:3px; }
    .stat-pill.s-live .num { color:#22c55e; }
    .stat-pill.s-pending .num { color:#eab308; }
    .stat-pill.s-prospects .num { color:#3b82f6; }
    .stat-pill.s-actions .num { color:#f97316; }

    /* ── Hero Action (Priority #1) ── */
    .hero-action { background:linear-gradient(135deg, rgba(239,68,68,0.1), rgba(239,68,68,0.05)); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:16px; margin-bottom:14px; }
    .hero-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#ef4444; margin-bottom:6px; }
    .hero-title { font-size:15px; font-weight:700; color:#fff; margin-bottom:4px; }
    .hero-body { font-size:12px; color:#aaa; line-height:1.5; margin-bottom:12px; }
    .hero-link { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; background:#ef4444; color:#fff; border-radius:6px; font-size:12px; font-weight:600; text-decoration:none; transition:background 0.15s; }
    .hero-link:active { background:#dc2626; }

    /* ── Action Cards (compact) ── */
    .action-card { display:flex; align-items:center; gap:10px; background:#141414; border:1px solid #1e1e1e; border-radius:8px; padding:10px 12px; margin-bottom:6px; cursor:pointer; transition:background 0.15s; text-decoration:none; color:inherit; }
    .action-card:active { background:#1a1a1a; }
    .action-icon { font-size:16px; flex-shrink:0; width:28px; text-align:center; }
    .action-info { flex:1; min-width:0; }
    .action-title { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .action-title.urgent { color:#f97316; }
    .action-title.warn { color:#eab308; }
    .action-sub { font-size:10px; color:#666; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .action-go { padding:4px 10px; background:#222; border:1px solid #333; border-radius:4px; font-size:10px; color:#888; text-decoration:none; flex-shrink:0; white-space:nowrap; transition:all 0.15s; }
    .action-go:active { background:#333; color:#ccc; }

    /* ── Group Summary Card ── */
    .group-card { background:#141414; border:1px solid #1e1e1e; border-radius:8px; padding:12px; margin-bottom:6px; }
    .group-header { display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .group-title { font-size:12px; font-weight:600; }
    .group-count { padding:3px 8px; background:rgba(249,115,22,0.12); color:#f97316; border-radius:4px; font-size:10px; font-weight:700; }
    .group-chevron { color:#555; font-size:12px; transition:transform 0.2s; margin-left:8px; }
    .group-chevron.open { transform:rotate(90deg); }
    .group-items { display:none; margin-top:8px; padding-top:8px; border-top:1px solid #1e1e1e; }
    .group-items.open { display:block; }
    .group-item { display:flex; align-items:center; gap:8px; padding:5px 0; font-size:11px; }
    .group-item-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .group-item-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#aaa; }
    .group-item-status { font-size:10px; color:#666; flex-shrink:0; }

    /* ── Prospect Cards ── */
    .prospect-card { background:#141414; border:1px solid #1e1e1e; border-radius:8px; padding:12px; margin-bottom:6px; }
    .prospect-card.hot { border-left:3px solid #22c55e; }
    .prospect-card.warm { border-left:3px solid #3b82f6; }
    .prospect-card.stale { opacity:0.5; border-left:3px solid #444; }
    .prospect-top { display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .prospect-name { font-size:13px; font-weight:600; flex:1; min-width:0; }
    .status-tag { display:inline-block; padding:2px 6px; border-radius:3px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.3px; white-space:nowrap; flex-shrink:0; }
    .status-tag.app { background:#22c55e; color:#000; }
    .status-tag.responded { background:#3b82f6; color:#fff; }
    .status-tag.tour { background:#8b5cf6; color:#fff; }
    .status-tag.stale { background:#333; color:#888; }
    .prospect-meta { font-size:10px; color:#666; margin-top:3px; }
    .prospect-detail { display:none; margin-top:8px; padding-top:8px; border-top:1px solid #1e1e1e; font-size:11px; color:#999; line-height:1.5; }
    .prospect-detail.open { display:block; }
    .prospect-action { margin-top:6px; font-size:11px; color:#f97316; padding:6px 8px; background:rgba(249,115,22,0.06); border-radius:4px; border-left:2px solid #f97316; }

    /* ── Listing Rows ── */
    .listing-row { display:flex; align-items:center; padding:10px 12px; background:#141414; border:1px solid #1e1e1e; border-radius:6px; margin-bottom:4px; gap:8px; cursor:pointer; transition:background 0.15s; }
    .listing-row:active { background:#1a1a1a; }
    .listing-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .listing-dot.live { background:#22c55e; }
    .listing-dot.pending { background:#eab308; }
    .listing-dot.warn { background:#f97316; }
    .listing-dot.error { background:#ef4444; }
    .listing-dot.inactive { background:#444; }
    .listing-info { flex:1; min-width:0; }
    .listing-name { font-size:12px; font-weight:500; }
    .listing-sub { font-size:10px; color:#666; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .listing-expanded { display:none; padding:8px 12px; margin:-2px 0 4px; background:#111; border:1px solid #1e1e1e; border-top:none; border-radius:0 0 6px 6px; font-size:11px; color:#999; line-height:1.4; }
    .listing-expanded.open { display:block; }

    /* ── Tours ── */
    .tour-card { background:#141414; border:1px solid #1e1e1e; border-left:3px solid #8b5cf6; border-radius:8px; padding:10px 12px; margin-bottom:6px; }
    .tour-top { display:flex; justify-content:space-between; align-items:center; }
    .tour-name { font-size:12px; font-weight:600; }
    .tour-type { font-size:10px; color:#8b5cf6; font-weight:500; }
    .tour-meta { font-size:10px; color:#666; margin-top:2px; }
    .tour-notes { font-size:10px; color:#555; margin-top:4px; line-height:1.3; }

    /* ── System ── */
    .sys-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
    .sys-item { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#141414; border:1px solid #1e1e1e; border-radius:6px; }
    .sys-name { font-size:10px; font-weight:500; }
    .sys-detail { font-size:9px; color:#555; margin-top:1px; }
    .sys-badge { padding:2px 6px; border-radius:3px; font-size:8px; font-weight:700; text-transform:uppercase; flex-shrink:0; }
    .sys-badge.live { background:rgba(34,197,94,0.15); color:#22c55e; }
    .sys-badge.pending { background:rgba(234,179,8,0.15); color:#eab308; }
    .sys-badge.error { background:rgba(239,68,68,0.15); color:#ef4444; }
    .freshness-card { padding:10px; background:#141414; border:1px solid #1e1e1e; border-radius:6px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }

    /* ── Quick Links Footer ── */
    .quick-links { position:fixed; bottom:0; left:0; right:0; background:rgba(10,10,10,0.95); backdrop-filter:blur(8px); border-top:1px solid #1a1a1a; padding:6px 8px; padding-bottom:calc(6px + env(safe-area-inset-bottom)); display:flex; justify-content:center; gap:6px; max-width:600px; margin:0 auto; }
    .qlink { padding:6px 12px; background:#141414; border:1px solid #1e1e1e; border-radius:16px; font-size:11px; color:#888; text-decoration:none; transition:all 0.15s; white-space:nowrap; }
    .qlink:active { background:#1a1a1a; color:#ccc; }

    /* ── Utilities ── */
    .empty-state { text-align:center; padding:20px 16px; color:#444; font-size:11px; }
    @media (min-width:640px) { .topbar,.rooms-strip,.tab-bar,.content-area,.quick-links { max-width:600px; } }
  </style>
</head>
<body>
  <div class="stale-banner" id="stale-banner">Data is <span class="age" id="stale-age"></span> old. Sweeps may not be running.</div>

  <div class="topbar">
    <div class="topbar-row">
      <div class="topbar-left">
        <h1>Stuart Dash</h1>
        <div class="subtitle" id="subtitle">Loading...</div>
      </div>
      <div class="update-badge">
        <span class="pulse-dot" id="pulse-dot"></span>
        <span id="update-time">Loading...</span>
      </div>
    </div>
  </div>

  <div class="rooms-strip" id="rooms-strip"></div>

  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="overview">Overview<span class="tab-badge alert" id="badge-actions" style="display:none"></span></button>
    <button class="tab-btn" data-tab="pipeline">Pipeline<span class="tab-badge count" id="badge-prospects" style="display:none"></span></button>
    <button class="tab-btn" data-tab="listings">Listings<span class="tab-badge count" id="badge-listings" style="display:none"></span></button>
    <button class="tab-btn" data-tab="system">System</button>
  </div>

  <div class="content-area">
    <div class="tab-panel active" id="panel-overview">
      <div class="stats-row">
        <div class="stat-pill s-live"><div class="num" id="s-live">0</div><div class="lbl">Live</div></div>
        <div class="stat-pill s-pending"><div class="num" id="s-pending">0</div><div class="lbl">Pending</div></div>
        <div class="stat-pill s-prospects"><div class="num" id="s-prospects">0</div><div class="lbl">Prospects</div></div>
        <div class="stat-pill s-actions"><div class="num" id="s-actions">0</div><div class="lbl">Actions</div></div>
      </div>
      <div id="overview-hero"></div>
      <div id="overview-actions"></div>
      <div id="overview-prospects"></div>
      <div id="overview-tours"></div>
    </div>

    <div class="tab-panel" id="panel-pipeline">
      <div id="pipeline-hot"></div>
      <div id="pipeline-active"></div>
      <div id="pipeline-stale"></div>
    </div>

    <div class="tab-panel" id="panel-listings">
      <div id="listings-platforms"></div>
      <div id="listings-facebook"></div>
    </div>

    <div class="tab-panel" id="panel-system">
      <div id="system-grid"></div>
    </div>
  </div>

  <div class="quick-links">
    <a class="qlink" href="https://mail.google.com/mail/u/0/#drafts" target="_blank">Gmail</a>
    <a class="qlink" href="https://www.spareroom.com/flatshare/myaccount/messages/" target="_blank">SpareRoom</a>
    <a class="qlink" href="https://www.zillow.com/rental-manager/properties/" target="_blank">Zillow</a>
    <a class="qlink" href="https://www.facebook.com/marketplace/you/selling" target="_blank">FB Mkt</a>
    <a class="qlink" href="https://sfbay.craigslist.org/d/rooms-shares/search/roo" target="_blank">CL</a>
  </div>

<script>
let state = { data:null, fetchTime:null };

/* ── Deep link map: source keyword → URL ── */
const LINKS = {
  'gmail':      'https://mail.google.com/mail/u/0/#drafts',
  'spareroom':  'https://www.spareroom.com/flatshare/myaccount/messages/',
  'zillow':     'https://www.zillow.com/rental-manager/properties/',
  'craigslist': 'https://sfbay.craigslist.org/d/rooms-shares/search/roo',
  'facebook':   'https://www.facebook.com/marketplace/you/selling',
  'calrentals': 'https://och.berkeley.edu/',
  'apartments': 'https://www.apartments.com/',
  'fb_group':   'https://www.facebook.com/groups/',
};

function linkFor(source, name) {
  const s = (source + ' ' + name).toLowerCase();
  if (s.includes('gmail') || s.includes('lease') || s.includes('draft')) return LINKS.gmail;
  if (s.includes('spareroom')) return LINKS.spareroom;
  if (s.includes('zillow')) return LINKS.zillow;
  if (s.includes('craigslist') || s.includes(' cl')) return LINKS.craigslist;
  if (s.includes('facebook market')) return LINKS.facebook;
  if (s.includes('calrentals') || s.includes('och.berkeley')) return LINKS.calrentals;
  if (s.includes('apartments.com')) return LINKS.apartments;
  // FB groups
  if (s.includes('uc berkeley housing')) return 'https://www.facebook.com/groups/ucberkeley.housing/';
  if (s.includes('uc berkeley off')) return 'https://www.facebook.com/groups/ucberkeleyoffcampus/';
  if (s.includes('berkeley ca rental')) return 'https://www.facebook.com/groups/berkeleyrentals/';
  if (s.includes('berkeley & bay') || s.includes('berkeley bay')) return 'https://www.facebook.com/groups/berkeleyrentals/';
  if (s.includes('bay area/sf') || s.includes('bay area sf')) return 'https://www.facebook.com/groups/bayareasfhousing/';
  if (s.includes('sf bay area')) return 'https://www.facebook.com/groups/sfbayareahousing/';
  if (s.includes('oakland')) return 'https://www.facebook.com/groups/oaklandhousing/';
  if (s.includes('facebook') || s.includes('fb')) return LINKS.fb_group;
  return null;
}

function linkLabel(source) {
  const s = (source || '').toLowerCase();
  if (s.includes('gmail') || s.includes('lease') || s.includes('draft')) return 'Open Gmail';
  if (s.includes('spareroom')) return 'Open SpareRoom';
  if (s.includes('zillow')) return 'Open Zillow';
  if (s.includes('craigslist')) return 'Open CL';
  if (s.includes('facebook') || s.includes('fb')) return 'Open FB';
  return 'Open';
}

document.addEventListener('DOMContentLoaded', () => { init(); setInterval(fetchAndRender,120000); setInterval(updateTimestamp,30000); });

async function init() { await fetchData(); render(); setupTabs(); }

async function fetchData() {
  try {
    const r = await fetch('data.json?_='+Date.now());
    if (!r.ok) throw new Error('fetch failed');
    state.data = await r.json();
    state.fetchTime = new Date();
    updateTimestamp();
  } catch(e) {
    document.getElementById('update-time').textContent='Offline';
    document.getElementById('pulse-dot').classList.add('error');
  }
}

function fetchAndRender() { fetchData().then(render); }

function updateTimestamp() {
  const el = document.getElementById('update-time');
  const dot = document.getElementById('pulse-dot');
  const banner = document.getElementById('stale-banner');
  const ageSpan = document.getElementById('stale-age');
  if (!state.data || !state.data.lastUpdated) { el.textContent='No data'; dot.className='pulse-dot error'; return; }
  const dataTime = new Date(state.data.lastUpdated);
  const mins = Math.floor((Date.now()-dataTime)/60000);
  const hours = Math.floor(mins/60);
  const days = Math.floor(hours/24);
  let ageStr;
  if (mins<1) ageStr='Just now';
  else if (mins<60) ageStr=mins+'m ago';
  else if (hours<24) ageStr=hours+'h '+mins%60+'m ago';
  else ageStr=days+'d '+hours%24+'h ago';
  el.textContent=ageStr;
  dot.className = 'pulse-dot'+(mins>360?' error':mins>60?' stale':'');
  if (mins>360) {
    ageSpan.textContent = days>0 ? days+'d '+(hours%24)+'h' : hours+'h '+mins%60+'m';
    banner.classList.add('visible');
  } else { banner.classList.remove('visible'); }
}

function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    });
  });
}

function render() {
  if (!state.data) return;
  const d = state.data;
  document.getElementById('subtitle').textContent = d.property.subtitle+' · '+d.property.address;
  document.getElementById('rooms-strip').innerHTML = d.property.rooms.map(r=>`<div class="room-chip"><span class="room-chip-name">${r.name}</span><span class="room-chip-meta">$${r.price} · ${r.availableDate}</span></div>`).join('');
  document.getElementById('s-live').textContent=d.stats.live;
  document.getElementById('s-pending').textContent=d.stats.pending;
  document.getElementById('s-prospects').textContent=d.stats.prospects;
  document.getElementById('s-actions').textContent=d.stats.actions;
  if(d.stats.actions>0){const b=document.getElementById('badge-actions');b.textContent=d.stats.actions;b.style.display='';}
  if(d.stats.prospects>0){const b=document.getElementById('badge-prospects');b.textContent=d.stats.prospects;b.style.display='';}
  const tl=(d.listings||[]).filter(l=>l.status!=='inactive').length;
  if(tl>0){const b=document.getElementById('badge-listings');b.textContent=tl;b.style.display='';}
  renderOverview(d);
  renderPipeline(d);
  renderListings(d);
  renderSystem(d);
}

/* ═══ OVERVIEW ═══ */
function renderOverview(d) {
  const actions = d.actions || [];
  const prospects = d.prospects || [];

  // Determine hero: Julian's lease email is priority #1 if still pending
  const julian = prospects.find(p => p.name === 'Julian Flanagan' && p.status && p.status.includes('LEASE PENDING'));
  const heroEl = document.getElementById('overview-hero');

  if (julian) {
    heroEl.innerHTML = `
      <div class="hero-action">
        <div class="hero-label">Priority #1</div>
        <div class="hero-title">Send Julian Flanagan's lease email</div>
        <div class="hero-body">Draft is in Gmail — $1,650/mo, Aug 1 2026–Jul 31 2027. $3,300 due at signing. This is your best prospect: Berkeley Biophysics PhD, approved.</div>
        <a class="hero-link" href="https://mail.google.com/mail/u/0/#drafts" target="_blank">→ Open Gmail Drafts</a>
      </div>`;
  } else if (actions.length) {
    const a = actions[0];
    const url = linkFor(a.source, a.priority);
    heroEl.innerHTML = `
      <div class="hero-action">
        <div class="hero-label">Priority #1</div>
        <div class="hero-title">${a.priority}</div>
        <div class="hero-body">${a.text.length > 140 ? a.text.substring(0,137)+'...' : a.text}</div>
        ${url ? `<a class="hero-link" href="${url}" target="_blank">→ ${linkLabel(a.source)}</a>` : ''}
      </div>`;
  } else {
    heroEl.innerHTML = '';
  }

  // Remaining actions as compact cards (skip first if it became hero and no Julian)
  const startIdx = julian ? 0 : 1;
  const remaining = actions.slice(startIdx);

  // Group FB groups that all need reposting
  const fbRepost = remaining.filter(a => a.source === 'listings' && a.text && a.text.includes('repost'));
  const nonFb = remaining.filter(a => !(a.source === 'listings' && a.text && a.text.includes('repost')));

  const ac = document.getElementById('overview-actions');
  let html = '';

  if (nonFb.length) {
    html += '<div class="section-hdr">Needs Attention</div>';
    nonFb.forEach(a => {
      const url = linkFor(a.source, a.priority);
      const isUrgent = a.icon === '🔴' || a.icon === '⚠️';
      html += `
        <div class="action-card" ${url ? `onclick="window.open('${url}','_blank')"` : ''}>
          <div class="action-icon">${a.icon}</div>
          <div class="action-info">
            <div class="action-title ${isUrgent?'urgent':''}">${a.priority}</div>
            <div class="action-sub">${a.text.length>80 ? a.text.substring(0,77)+'...' : a.text}</div>
          </div>
          ${url ? `<a class="action-go" href="${url}" target="_blank" onclick="event.stopPropagation()">Open →</a>` : ''}
        </div>`;
    });
  }

  // Collapsed FB group repost card
  if (fbRepost.length) {
    html += `
      <div class="group-card">
        <div class="group-header" onclick="toggleGroup('fb-repost')">
          <div class="group-title">⚠️ Facebook groups need reposting</div>
          <div><span class="group-count">${fbRepost.length} groups</span><span class="group-chevron" id="chev-fb-repost">›</span></div>
        </div>
        <div class="group-items" id="group-fb-repost">
          ${fbRepost.map(a => {
            const url = linkFor('facebook', a.priority);
            return `<div class="group-item">
              <span class="group-item-dot" style="background:#f97316"></span>
              <span class="group-item-name">${a.priority}</span>
              ${url ? `<a class="action-go" href="${url}" target="_blank" style="font-size:9px;padding:2px 6px" onclick="event.stopPropagation()">Repost →</a>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  // Top prospects (compact, 3 max)
  const hot = categorizeProspects(prospects).hot.slice(0,2);
  const active = categorizeProspects(prospects).active.filter(p => {
    const s = (p.status||'').toUpperCase();
    return !s.includes('STALE') && !s.includes('ARCHIVED');
  }).slice(0,2);
  const topP = [...hot, ...active].slice(0,3);

  if (topP.length) {
    html += '<div class="section-hdr">Top Prospects</div>';
    topP.forEach(p => { html += renderProspectCard(p, p.status?.toUpperCase().includes('TOUR') || p.status?.toUpperCase().includes('APPLICATION') ? 'hot' : 'warm', true); });
  }

  // Tours
  const tours = d.tours || {};
  const scheduled = tours.scheduled || [];
  if (scheduled.length) {
    html += '<div class="section-hdr">Upcoming Tours</div>';
    scheduled.forEach(t => {
      html += `<div class="tour-card"><div class="tour-top"><span class="tour-name">${t.prospect}</span><span class="tour-type">${t.type}</span></div><div class="tour-meta">${t.date} ${t.time} · ${t.confirmed}</div>${t.notes?`<div class="tour-notes">${t.notes.length>100?t.notes.substring(0,97)+'...':t.notes}</div>`:''}</div>`;
    });
  }

  ac.innerHTML = html;
}

function toggleGroup(id) {
  const el = document.getElementById('group-'+id);
  const chev = document.getElementById('chev-'+id);
  if (el) { el.classList.toggle('open'); if(chev) chev.classList.toggle('open'); }
}

/* ═══ PIPELINE ═══ */
function categorizeProspects(prospects) {
  const hot=[], active=[], stale=[];
  (prospects||[]).filter(p=>p.active).forEach(p=>{
    const s=(p.status||'').toUpperCase();
    if(s.includes('APPLICATION')||s.includes('APPROVED')||s.includes('TOUR SCHED')||s.includes('TOURED')||s.includes('LEASE')) hot.push(p);
    else if(s.includes('STALE')||s.includes('ARCHIVED')) stale.push(p);
    else active.push(p);
  });
  return {hot,active,stale};
}

function renderProspectCard(p, tier, compact) {
  const s=(p.status||'').toUpperCase();
  let tagClass='responded';
  if(s.includes('APPROVED')||s.includes('LEASE')) tagClass='app';
  else if(s.includes('TOUR')) tagClass='tour';
  else if(s.includes('STALE')||s.includes('ARCHIVED')) tagClass='stale';
  let label=p.status.replace(/[✅❌⚠️📨🔍🔑]/g,'').trim();
  if(label.length>22) label=label.substring(0,22);

  const url = linkFor(p.source, p.name);
  const pid = 'p-'+(p.id||Math.random().toString(36).substr(2,5));

  let html = `<div class="prospect-card ${tier}" onclick="document.getElementById('${pid}').classList.toggle('open')">
    <div class="prospect-top">
      <span class="prospect-name">${p.name}</span>
      <span class="status-tag ${tagClass}">${label}</span>
    </div>
    <div class="prospect-meta">${p.source||''}${p.date?' · '+p.date:''}${url ? ' · <a class="action-go" href="'+url+'" target="_blank" onclick="event.stopPropagation()" style="font-size:9px;padding:1px 6px;display:inline">Open →</a>':''}
    </div>`;

  if (!compact) {
    const notes = p.notes||'';
    html += `<div class="prospect-detail" id="${pid}">${notes}</div>`;
  } else {
    const first = (p.notes||'').split(/\.\s/)[0];
    const summary = first ? (first.length>80?first.substring(0,77)+'...':first+'.') : '';
    html += `<div class="prospect-detail" id="${pid}">${p.notes||''}</div>`;
    if (summary) html += `<div style="font-size:10px;color:#777;margin-top:4px">${summary}</div>`;
  }

  if(p.actionNeeded) html += `<div class="prospect-action">${p.actionNeeded}</div>`;
  html += '</div>';
  return html;
}

function renderPipeline(d) {
  const {hot,active,stale} = categorizeProspects(d.prospects);
  const hc=document.getElementById('pipeline-hot');
  hc.innerHTML = '<div class="section-hdr">Hot Leads</div>' + (hot.length ? hot.map(p=>renderProspectCard(p,'hot',false)).join('') : '<div class="empty-state">No hot leads</div>');
  const ac=document.getElementById('pipeline-active');
  ac.innerHTML = active.length ? '<div class="section-hdr">Active</div>'+active.map(p=>renderProspectCard(p,'warm',false)).join('') : '';
  const sc=document.getElementById('pipeline-stale');
  sc.innerHTML = stale.length ? '<div class="section-hdr">Stale / Archived</div>'+stale.map(p=>renderProspectCard(p,'stale',false)).join('') : '';
}

/* ═══ LISTINGS ═══ */
function renderListings(d) {
  const listings=d.listings||[];
  const platforms=listings.filter(l=>l.category==='platform');
  const fbGroups=listings.filter(l=>l.category==='facebook_group');

  const pc=document.getElementById('listings-platforms');
  if(platforms.length) {
    pc.innerHTML='<div class="section-hdr">Platforms</div>'+platforms.map(l=>{
      const url=linkFor(l.name,'');
      return `<div class="listing-row" onclick="toggleListing('${l.id}')">
        <span class="listing-dot ${l.status}"></span>
        <div class="listing-info"><div class="listing-name">${l.name}</div><div class="listing-sub">${(l.notes||'').substring(0,50)}...</div></div>
        ${url?`<a class="action-go" href="${url}" target="_blank" onclick="event.stopPropagation()">Open →</a>`:''}
      </div><div class="listing-expanded" id="exp-${l.id}">${l.detail}</div>`;
    }).join('');
  }

  const fc=document.getElementById('listings-facebook');
  if(fbGroups.length) {
    const live=fbGroups.filter(g=>g.status==='live').length;
    const warn=fbGroups.filter(g=>g.status==='warn').length;
    fc.innerHTML=`<div class="section-hdr">Facebook Groups · ${live} live · ${warn} need repost</div>` +
      fbGroups.map(g=>{
        const url=linkFor('facebook',g.name);
        return `<div class="listing-row" onclick="toggleListing('${g.id}')">
          <span class="listing-dot ${g.status}"></span>
          <div class="listing-info"><div class="listing-name">${g.name}</div><div class="listing-sub">${g.status==='warn'?'Due for repost':(g.notes||'').substring(0,40)}</div></div>
          ${url?`<a class="action-go" href="${url}" target="_blank" onclick="event.stopPropagation()">Open →</a>`:''}
        </div><div class="listing-expanded" id="exp-${g.id}">${g.detail}</div>`;
      }).join('');
  }
}

function toggleListing(id) {
  const exp=document.getElementById('exp-'+id);
  if(exp) exp.classList.toggle('open');
}

/* ═══ SYSTEM ═══ */
function renderSystem(d) {
  const systems=d.system||[];
  const container=document.getElementById('system-grid');
  if(!systems.length){container.innerHTML='<div class="empty-state">No system data</div>';return;}

  const dataTime=d.lastUpdated?new Date(d.lastUpdated):null;
  const ageMins=dataTime?Math.floor((Date.now()-dataTime)/60000):9999;

  const enriched=systems.map(s=>{
    if(s.name==='Dashboard Sync'){
      let st='live',dt=s.detail;
      if(ageMins>360){st='error';dt='Last sync: '+Math.floor(ageMins/60)+'h ago';}
      else if(ageMins>60){st='pending';dt='Last sync: '+Math.floor(ageMins/60)+'h ago';}
      else{dt='Last sync: '+ageMins+'m ago';}
      return{...s,status:st,detail:dt};
    }
    return s;
  });

  let fresh='';
  if(dataTime){
    const hrs=Math.floor(ageMins/60),days=Math.floor(hrs/24);
    let label;
    if(ageMins<60) label=ageMins+' minutes';
    else if(hrs<24) label=hrs+'h '+ageMins%60+'m';
    else label=days+'d '+(hrs%24)+'h';
    const color=ageMins>360?'#ef4444':ageMins>60?'#f97316':'#22c55e';
    fresh=`<div class="freshness-card"><div><div style="font-size:10px;font-weight:600;color:#888">Data Freshness</div><div style="font-size:12px;color:${color};font-weight:600;margin-top:2px">${label} old</div></div><div style="font-size:9px;color:#555">${dataTime.toLocaleString()}</div></div>`;
  }

  container.innerHTML='<div class="section-hdr">Automation Status</div>'+fresh+'<div class="sys-grid">'+enriched.map(s=>`<div class="sys-item"><div><div class="sys-name">${s.name}</div><div class="sys-detail">${s.detail}</div></div><span class="sys-badge ${s.status}">${s.status}</span></div>`).join('')+'</div>';
}
</script>
